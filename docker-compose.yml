services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: research_qdrant
    ports:
      - "6333:6333"   # REST / HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: research_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  qdrant_storage:
  redis_data:
