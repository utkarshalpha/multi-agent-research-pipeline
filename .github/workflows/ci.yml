# Continuous integration: run the full offline test suite in MOCK_MODE.
#
# The pipeline's mocks are deterministic and hash-derived, so no API keys,
# Docker services, or network access are required — Qdrant runs in-memory and
# Redis degrades gracefully when absent.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Unit tests (offline MOCK_MODE)
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "true"
      QDRANT_PATH: ":memory:"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m unittest discover -s tests -v

  docker:
    name: Build, smoke-test, and publish Docker image
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      # Boot the container keyless in mock mode and exercise the real pipeline
      # end-to-end before anything is published.
      - name: Smoke test (offline MOCK_MODE)
        run: |
          docker run -d --name smoke -p 8000:8000 \
            -e MOCK_MODE=true -e QDRANT_PATH=':memory:' \
            "$IMAGE:${{ github.sha }}"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then break; fi
            if [ "$i" = "30" ]; then echo 'health check never came up'; docker logs smoke; exit 1; fi
            sleep 2
          done
          echo
          curl -fsS -X POST http://localhost:8000/research \
            -H 'Content-Type: application/json' \
            -d '{"query":"Container smoke test: tradeoffs between RAG and fine-tuning"}' \
            | python3 -c 'import json,sys; r=json.load(sys.stdin); assert r["report"] and r["citations"], "empty report/citations"; print("smoke OK:", r["metadata"]["model"], "-", len(r["citations"]), "citations")'
          docker rm -f smoke

      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
